<style>
:root{
  --paper:#F7F5F0; --panel:#FFFFFF; --ink:#1A1D21;
  --muted:#6E7580; --faint:#9AA0A8; --rule:#E4E1D8; --rule2:#EEECE5;
  --sig:#B23A2E; --sig-bg:#FBEEEC; --amber:#8A5A00; --amber-bg:#FBF3E2;
  --sea:#2E5C63; --sea-bg:#E9F1F1; --sea-line:#CDDEDE;
  --disp:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;padding:0 0 5rem}
.wrap{max-width:720px;margin:0 auto;padding:0 1.5rem}
@media(max-width:520px){.wrap{padding:0 1.1rem}}

/* header */
header{border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:0;z-index:10}
.hbar{max-width:720px;margin:0 auto;padding:.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.brand{display:flex;align-items:center;gap:.6rem;font-weight:600;font-size:.9rem;letter-spacing:-.01em}
.brand .dot{width:22px;height:22px;border-radius:6px;background:var(--sea);display:grid;place-items:center;color:#fff;font-family:var(--disp);font-size:.8rem;font-style:italic}
.hmeta{font-family:var(--mono);font-size:.62rem;color:var(--faint);text-align:right;line-height:1.45;letter-spacing:.02em}

/* progress */
.prog{height:2px;background:var(--rule2);position:relative;overflow:hidden}
.prog>i{position:absolute;left:0;top:0;bottom:0;background:var(--sea);width:0;transition:width .3s cubic-bezier(.4,0,.2,1)}

main{padding-top:2rem}
.step{animation:rise .22s cubic-bezier(.2,.6,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.step{animation:none}.prog>i{transition:none}}

.trace{font-family:var(--mono);font-size:.64rem;color:var(--faint);margin-bottom:1.6rem;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.trace::-webkit-scrollbar{display:none}
.trace b{color:var(--sea);font-weight:500}
.trace .s{opacity:.4;padding:0 .3rem}

.eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem}
h1{font-family:var(--disp);font-size:2.15rem;line-height:1.08;font-weight:500;letter-spacing:-.02em;margin-bottom:.7rem}
h2{font-family:var(--disp);font-size:1.55rem;line-height:1.18;font-weight:500;letter-spacing:-.015em;margin-bottom:.6rem}
h3{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.7rem}
p{margin-bottom:.9rem}
.lede{color:var(--muted);font-size:1rem;margin-bottom:1.8rem;max-width:42ch}
.lede.wide{max-width:52ch}

/* system grid — home */
.sysgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.5rem}
@media(max-width:560px){.sysgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:360px){.sysgrid{grid-template-columns:1fr}}
button.sys{font:inherit;cursor:pointer;text-align:left;background:var(--panel);border:1px solid var(--rule);border-radius:14px;padding:1.1rem 1rem 1rem;display:flex;flex-direction:column;gap:.75rem;transition:transform .13s,border-color .13s,box-shadow .13s;color:var(--ink)}
button.sys:hover{border-color:var(--sea);transform:translateY(-2px);box-shadow:0 6px 20px -12px rgba(46,92,99,.4)}
button.sys:focus-visible{outline:2px solid var(--sea);outline-offset:2px}
.sys .ic{width:34px;height:34px;color:var(--sea)}
.sys .ic svg{width:100%;height:100%;display:block}
.sys .st{font-weight:600;font-size:.98rem;letter-spacing:-.01em}
.sys .ss{font-size:.8rem;color:var(--muted);line-height:1.35}

/* option rows */
.opts{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.6rem}
button.opt{font:inherit;text-align:left;cursor:pointer;background:var(--panel);border:1px solid var(--rule);border-radius:12px;padding:1rem 1.1rem;color:var(--ink);display:flex;align-items:center;gap:1rem;transition:border-color .13s,background .13s,transform .1s}
button.opt:hover{border-color:var(--sea);background:var(--sea-bg)}
button.opt:active{transform:scale(.994)}
button.opt:focus-visible{outline:2px solid var(--sea);outline-offset:2px}
.opt .chev{color:var(--faint);flex:none;transition:transform .13s}
button.opt:hover .chev{transform:translateX(3px);color:var(--sea)}
.opt-body{flex:1;min-width:0}
.opt-t{font-weight:500;display:block}
.opt-s{font-size:.82rem;color:var(--muted);display:block;margin-top:.15rem}

/* morphology / visual cards */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.6rem}
@media(max-width:560px){.cards{grid-template-columns:repeat(2,1fr)}}
button.card{font:inherit;cursor:pointer;text-align:left;background:var(--panel);border:1px solid var(--rule);border-radius:13px;padding:.85rem;display:flex;flex-direction:column;gap:.4rem;transition:transform .13s,border-color .13s,box-shadow .13s;color:var(--ink)}
button.card:hover{border-color:var(--sea);transform:translateY(-2px);box-shadow:0 6px 18px -12px rgba(46,92,99,.4)}
button.card:focus-visible{outline:2px solid var(--sea);outline-offset:2px}
.card svg.mo{width:100%;height:auto;display:block;margin-bottom:.1rem}
.card-t{font-weight:600;font-size:.9rem;letter-spacing:-.01em}
.card-term{font-family:var(--mono);font-size:.6rem;color:var(--faint);letter-spacing:.05em}
.card-s{font-size:.76rem;color:var(--muted);line-height:1.3}

/* checklist */
.checks{border:1px solid var(--rule);border-radius:13px;background:var(--panel);margin-bottom:1.1rem;overflow:hidden}
label.check{display:flex;gap:.85rem;align-items:flex-start;padding:.9rem 1.05rem;border-bottom:1px solid var(--rule2);cursor:pointer;font-size:.94rem;transition:background .1s}
label.check:last-child{border-bottom:none}
label.check:hover{background:var(--sea-bg)}
label.check input{margin-top:.28rem;accent-color:var(--sig);width:1.05rem;height:1.05rem;flex:none}
.ck-cap{font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:.7rem 1.05rem .2rem}

button.primary{font:inherit;font-weight:600;cursor:pointer;width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:12px;padding:1rem;transition:opacity .13s,transform .1s;font-size:.98rem}
button.primary:hover{opacity:.88}
button.primary:active{transform:scale(.99)}
button.primary:focus-visible{outline:2px solid var(--sea);outline-offset:2px}

.back{font:inherit;font-size:.85rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:.4rem 0;margin-bottom:1rem;display:inline-flex;align-items:center;gap:.35rem}
.back:hover{color:var(--ink)}

/* terminal */
.tier{border-radius:14px;padding:1.3rem 1.4rem;margin-bottom:1.6rem;border:1px solid}
.tier .tl{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:.55rem;display:flex;align-items:center;gap:.5rem}
.tier .ta{font-family:var(--disp);font-size:1.4rem;font-weight:500;line-height:1.2;letter-spacing:-.01em}
.tier .tsub{font-size:.86rem;margin-top:.55rem;line-height:1.45}
.tier.emergent{border-color:var(--sig);background:var(--sig-bg);color:var(--sig)}
.tier.urgent{border-color:var(--sig);background:var(--panel);color:var(--sig)}
.tier.prompt{border-color:#E4C97A;background:var(--amber-bg);color:var(--amber)}
.tier.handoff{border-color:var(--sea-line);background:var(--sea-bg);color:var(--sea)}
.tier .tsub{color:var(--ink)}

.block{border-top:1px solid var(--rule);padding-top:1.3rem;margin-bottom:1.3rem}
.why{font-size:1rem;margin-bottom:1.2rem;line-height:1.6}
ul.al{list-style:none;margin-bottom:.6rem;display:flex;flex-wrap:wrap;gap:.5rem}
ul.al li{background:var(--panel);border:1px solid var(--rule);border-radius:20px;padding:.35rem .85rem;font-size:.86rem;font-weight:500}
ol{margin:0 0 .6rem 1.2rem}
ol li{margin-bottom:.5rem;font-size:.94rem;padding-left:.2rem}
.note{font-size:.84rem;color:var(--muted);line-height:1.5}
.warn{border-left:3px solid var(--sig);background:var(--sig-bg);border-radius:0 8px 8px 0;padding:.85rem 1rem;margin-bottom:1.2rem;font-size:.92rem;color:var(--ink)}
.warn b{color:var(--sig)}

.photoguide{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin:.9rem 0}
.pg{border:1px solid var(--rule);border-radius:10px;background:var(--panel);padding:.6rem;text-align:center}
.pg svg{width:100%;height:auto;display:block;margin-bottom:.35rem}
.pg span{font-family:var(--mono);font-size:.6rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}

details{border:1px solid var(--rule);border-radius:12px;background:var(--panel);margin-bottom:1.3rem;overflow:hidden}
summary{padding:.9rem 1.1rem;cursor:pointer;font-family:var(--mono);font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.5rem;list-style:none}
summary::-webkit-details-marker{display:none}
summary::before{content:'+';font-size:1rem;color:var(--sea)}
details[open] summary::before{content:'\u2013'}
.det{padding:0 1.1rem 1.1rem;border-top:1px solid var(--rule2)}
.det h4{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:1rem 0 .5rem}
.det ol{margin-left:1.1rem}
.det li,.det p{font-size:.86rem}
.det .path{font-family:var(--mono);font-size:.7rem;color:var(--faint);word-break:break-word}
.dxlist{list-style:none;margin:0 0 .4rem}
.dxlist li{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.4rem;padding-left:0}
.dxlist li::before{display:none}
.band{font-family:var(--mono);font-size:.6rem;letter-spacing:.04em;text-transform:uppercase;padding:.15rem .45rem;border-radius:5px;flex:none;min-width:82px;text-align:center}
.band.b-high{background:var(--sea-bg);color:var(--sea)}
.band.b-mid{background:#F1EEE6;color:var(--muted)}
.band.b-low{background:#F1EEE6;color:var(--faint)}
.band.b-danger{background:var(--sig-bg);color:var(--sig)}
.dxname{font-size:.86rem}
.dxnote{font-size:.78rem;color:var(--muted);margin:.2rem 0 .9rem;line-height:1.5}

.safety{border:1px solid var(--ink);border-radius:12px;padding:1.05rem 1.2rem;margin-bottom:1.6rem;font-size:.92rem;line-height:1.5}
.safety b{display:block;margin-bottom:.35rem;font-weight:600}
.foot{font-family:var(--mono);font-size:.64rem;color:var(--faint);line-height:1.7;border-top:1px solid var(--rule);padding-top:1.1rem}
.restart{font:inherit;font-size:.86rem;background:none;border:1px solid var(--rule);border-radius:10px;padding:.65rem 1.1rem;cursor:pointer;color:var(--muted);margin-bottom:1.5rem}
.restart:hover{border-color:var(--ink);color:var(--ink)}

.cantmiss{border:1px solid var(--sig);background:var(--sig-bg);border-radius:11px;padding:.85rem 1rem;margin-bottom:1.3rem}

     1. Every complaint passes a DETERMINISTIC red-flag gate first.
     2. Branching is a hand-authored decision tree. No model is called.
     3. Output is ESCALATE or HANDOFF. The tool never names the
        patient's diagnosis and never tells anyone to stay home.
     4. Terminal nodes are pre-approved content: a clinician signs

 'T-STEROID-FAIL':{tier:'prompt',why:'A steroid cream that did not clear this is one of the most informative facts in skin medicine, and one of the most overlooked. It changes what a clinician should consider, and it means a second course is not the answer.',warn:'Do not apply more steroid cream. If it did not work once, more can let some conditions spread and make others harder to recognize later.',consider:['Fungal infection changed by the steroid','Inflammatory conditions needing a different treatment','Scabies','Conditions that mimic eczema and need a biopsy'],distinguish:'Direct examination, sometimes a scraping or biopsy. Not possible from a photo.',bring:['Every cream used, and for how long','Photos before treatment if any','Photos now'],clin:{ranked:['Tinea incognito','Scabies','Cutaneous T-cell lymphoma','Pre-bullous pemphigoid','Cutaneous lupus','Secondary syphilis'],against:'A steroid-responsive dermatitis should have improved. Non-response is the finding.',danger:'CTCL wears an eczema label for years because it partially responds to steroids. KOH, scabies prep, low threshold to biopsy. '+ATLAS}},
 'T-ANTIFUNGAL-FAIL':{tier:'prompt',why:'An antifungal that did not work is useful but not conclusive. Most antifungal \u201Cfailures\u201D are failures of duration \u2014 stopped at five days when the skin needed two to four weeks.',warn:'Do not now switch to a steroid on the assumption it must be inflammation. If it is fungal and undertreated, a steroid will spread it.',consider:['Fungal infection treated too briefly','Granuloma annulare','Nummular eczema','Psoriasis'],distinguish:'How long and how it was used, then a scraping under the microscope.',bring:['Exact antifungal name and days used','Whether you continued after it looked better','Whether you have athlete\u2019s foot or a fungal toenail'],clin:{ranked:['Tinea, inadequate course','Nummular eczema','Granuloma annulare','Inverse psoriasis','CTCL'],against:'True tinea usually improves within two weeks of adequate therapy. Five days is not a trial.',danger:'KOH before steroid. Look for a tinea pedis / onychomycosis reservoir. '+ATLAS}},
 'T-BOTH-FAIL':{tier:'prompt',why:'Skin that resisted both a steroid and an antifungal will not be solved by a third cream. Those two cover most of what causes a persistent rash. When both fail, someone needs to examine the skin and consider a small sample.',warn:'Do not try anything else before you are seen \u2014 especially not a combined steroid-antifungal cream, which can spread a fungal infection while hiding it.',consider:['Cutaneous lymphoma','Fungal infection altered by steroid','Psoriasis','Scabies','Conditions needing a biopsy'],distinguish:'Direct exam, a scraping, and often a biopsy. Further creams only delay it.',bring:['Every cream, exact names, and durations','Photos across the whole time course','Whether others at home are affected'],clin:{ranked:['Tinea incognito','Cutaneous T-cell lymphoma','Scabies','Psoriasis','Subacute cutaneous lupus'],against:'A dermatitis that failed a potent steroid and a dermatophyte that failed an adequate antifungal cannot both be right.',danger:'Dual failure is the classic mycosis fungoides prodrome. This is a biopsy indication, not a prescribing puzzle. '+ATLAS}},
 'T-RING-TICK':{tier:'urgent',why:'An expanding ring after outdoor exposure in a tick area is time-sensitive and should be looked at today.',consider:['Fungal infection','Tick-borne infection','Other ring-shaped rashes'],distinguish:'The history \u2014 where, when, and how fast the ring grew \u2014 matters more than the look.',bring:['A photo today with a coin for scale','Where and when you were outdoors','Whether you found a tick'],clin:{ranked:['Erythema migrans','Tinea corporis','Granuloma annulare','Erythema multiforme'],against:'Tinea scales at the advancing border; erythema migrans usually does not.',danger:'Treat empirically if epidemiology and morphology fit; do not wait for serology in early disease. '+ATLAS}},
 'T-RING':{tier:'prompt',why:'Ring-shaped rashes with a scaling edge have a specific set of causes \u2014 and the treatment for one is the opposite of the treatment for another.',warn:'Do not use a steroid cream, including hydrocortisone. If this is fungal a steroid spreads it and hides it. Combination creams do the same.',consider:['Fungal infection','Granuloma annulare','Nummular eczema','Other ring-shaped rashes'],distinguish:'Whether the edge scales, whether the center clears, and if in doubt a scraping.',bring:['Close photo of the edge','A coin for scale','Whether household members or pets are affected'],clin:{ranked:['Tinea corporis','Granuloma annulare','Nummular eczema','Erythema annulare centrifugum'],against:'Absent scale argues against tinea.',danger:'KOH before any steroid. No combination product, ever. '+ATLAS}},
 'T-SCABIES':{tier:'prompt',why:'Itching that wakes you plus others at home itching points to something that spreads between people and will not settle on its own.',consider:['Scabies','Eczema','Insect bites','Contact dermatitis'],distinguish:'A clinician checks finger webs, wrists, waistline, and may scrape. Contacts are usually treated at the same time.',bring:['Photos of finger webs, wrists, waistline','Who else itches, and since when'],clin:{ranked:['Scabies','Atopic dermatitis','Papular urticaria','Dermatitis herpetiformis'],against:'Isolated itch without contacts or burrows weakens scabies.',danger:'Steroid relieves the symptom while the infestation and household seeding continue. Treat contacts. '+ATLAS}},
 'T-SCALE-EXT':{tier:'handoff',why:'Scaling on the outer elbows, knees, or scalp, or with nail changes, belongs to a family managed rather than cured, and worth naming correctly at the start.',consider:['Eczema','Fungal infection','Psoriasis','Seborrhoeic dermatitis'],distinguish:'Exactly where the scale sits, the nails, joint involvement, and response to first treatment.',bring:['Photos of elbows, knees, scalp, nails','Family history of psoriasis','Any morning joint stiffness'],clin:{ranked:['Plaque psoriasis','Nummular eczema','Tinea corporis','Seborrhoeic dermatitis'],against:'Flexural rather than extensor distribution argues against psoriasis.',danger:'Screen for psoriatic arthritis. Long-standing resistant plaque warrants biopsy. '+ATLAS}},
 'T-CHRONIC':{tier:'prompt',why:'A rash lasting longer than six weeks is no longer behaving like a passing irritation, and the list of what it could be has changed.',consider:['Chronic eczema','Chronic urticaria','Inflammatory conditions','Conditions needing a biopsy'],distinguish:'Duration is itself the finding \u2014 most self-limiting rashes have gone by six weeks.',bring:['Photos across time','Everything tried, and for how long','Your medication list'],clin:{ranked:['Chronic dermatitis','Psoriasis','CTCL','Cutaneous lupus'],against:'Duration alone does not discriminate; it raises the pre-test probability of what matters.',danger:'Six weeks is where biopsy stops being aggressive and becomes appropriate. '+ATLAS}},
 'T-ACNE':{tier:'handoff',why:'Blackheads and whiteheads with inflamed spots is a recognizable pattern with effective treatments \u2014 though several look-alikes are made worse by acne treatment.',consider:['Acne vulgaris','Folliculitis','Perioral dermatitis','Rosacea'],distinguish:'Whether blackheads and whiteheads are genuinely present \u2014 hard to judge in a mirror.',bring:['Photos straight on and both profiles, daylight','Everything used and for how long','Medication list including inhalers'],clin:{ranked:['Acne vulgaris','Malassezia folliculitis','Rosacea','Perioral dermatitis'],against:'Comedones present argues strongly for acne over every other entry.',danger:'Screen for hyperandrogenism; screen meds for steroids, lithium, EGFR inhibitors. '+ATLAS}},
 'T-ACNE-SEVERE':{tier:'prompt',why:'Deep painful lumps or scarring means over-the-counter and most primary-care treatments will not be enough, and scarring does not reverse.',consider:['Nodulocystic acne','Hidradenitis suppurativa','Deep folliculitis'],distinguish:'Where the lumps are, whether they tunnel or drain, and whether there is scarring.',bring:['Photos','How long scarring has developed','Family history'],clin:{ranked:['Nodulocystic acne','Hidradenitis suppurativa','Acne conglobata'],against:'Intertriginous sinus tracts is hidradenitis, not acne.',danger:'Needs isotretinoin and dermatology. Do not start a topical and rebook in three months. '+ATLAS}},
 'T-PERIORAL':{tier:'prompt',why:'A rash around the mouth sparing the lip border, after steroid cream or an inhaler, has a specific cause \u2014 and continuing the steroid makes it worse.',warn:'Do not apply more steroid here. Stopping often flares before it settles, which is why people restart it. A clinician should guide that.',consider:['Perioral dermatitis','Rosacea','Contact dermatitis','Seborrhoeic dermatitis'],distinguish:'Whether the lip border is spared, and all steroid exposure including inhalers.',bring:['Close photo of the area','Every steroid used including inhalers and sprays'],clin:{ranked:['Perioral dermatitis','Rosacea','Seborrhoeic dermatitis'],against:'Sparing of the vermilion border is near-pathognomonic.',danger:'Anticipate and explain the withdrawal flare or the cycle continues. '+ATLAS}},
 'T-ROSACEA':{tier:'handoff',why:'Redness and bumps across the central face without blackheads is a different pattern from acne, treated differently.',consider:['Rosacea','Perioral dermatitis','Seborrhoeic dermatitis','Facial conditions with a systemic cause'],distinguish:'Absence of blackheads; flushing, visible vessels, eye involvement.',bring:['Daylight photos straight on','Whether eyes are gritty or red','Flushing triggers'],clin:{ranked:['Papulopustular rosacea','Acne vulgaris','Seborrhoeic dermatitis','Cutaneous lupus'],against:'Comedones would move this toward acne.',danger:'Ask about ocular symptoms every time \u2014 ocular rosacea can threaten sight. '+ATLAS}},
 'T-MONOMORPHIC':{tier:'prompt',why:'Bumps that all look identical, without blackheads, often point away from ordinary acne \u2014 sometimes toward a medication reaction.',consider:['Medication acne-like reaction','Folliculitis','Rosacea','Yeast folliculitis'],distinguish:'Timing against any new medication, and whether every spot is at the same stage.',bring:['Full medication list with start dates','Photos','Recent antibiotics'],clin:{ranked:['Acneiform drug eruption','Malassezia folliculitis','Bacterial folliculitis','Gram-negative folliculitis'],against:'Absence of comedones argues against acne vulgaris.',danger:'Gram-negative folliculitis worsens on long-term antibiotics. Review steroids, lithium, EGFR inhibitors. '+ATLAS}},
 'T-URT-VASC':{tier:'prompt',why:'Ordinary hives move \u2014 each welt fades within a day. A welt that stays put beyond 24 hours, or bruises, is behaving differently and needs a different assessment.',consider:['Urticarial vasculitis','Ordinary hives','Fixed drug eruption','Vasculitis'],distinguish:'How long a single welt lasts \u2014 circle one and check tomorrow.',bring:['Photo of a circled, dated welt','Medication list','Any joint pain, fever, feeling unwell'],clin:{ranked:['Urticarial vasculitis','Chronic spontaneous urticaria','Fixed drug eruption','Small-vessel vasculitis'],against:'Welts resolving within 24h without residua argue for ordinary urticaria.',danger:'Urticarial vasculitis warrants biopsy and a systemic workup. '+ATLAS}},
 'T-URTICARIA':{tier:'handoff',why:'Raised welts that come and go, each fading within a day, are a recognizable pattern. Most of the time no cause is ever found \u2014 unsatisfying and also true.',consider:['Ordinary hives','Chronic spontaneous urticaria','Drug reaction','Physical urticaria'],distinguish:'How long each welt lasts, and whether anything reliably triggers them.',bring:['Photo of a circled, dated welt','Medication list','When they appear'],clin:{ranked:['Acute urticaria','Chronic spontaneous urticaria','Drug-induced urticaria'],against:'Lesions past 24h or bruising redirect to vasculitis.',danger:'Any airway symptom or vomiting with hives is anaphylaxis \u2014 the gate at the start, never softened.'}},
 'T-VESICLE':{tier:'urgent',why:'Small fluid-filled blisters can be several things, and a few of them \u2014 particularly a painful band on one side, or blisters near the eye \u2014 are treated more effectively the sooner they are seen.',consider:['Shingles','Cold sores','A blistering eczema flare','Contact reaction'],distinguish:'Whether it follows a band on one side, whether there is pain or tingling, and where it is.',bring:['Photos','When it started and whether pain came first','Whether it is near an eye'],clin:{ranked:['Herpes zoster','Herpes simplex','Acute vesicular eczema','Bullous contact dermatitis'],against:'Dermatomal distribution favours zoster.',danger:'Zoster near the eye (nasociliary involvement) threatens sight \u2014 same-day. Antivirals lose value after 72h. '+ATLAS}},
 'T-SINGLE':{tier:'prompt',why:'A single spot that is changing, growing, bleeding, or not healing is assessed differently from a rash. This tool will not offer an opinion on it, and neither should any app.',warn:'No photograph, and no software, can tell you whether a single lesion is harmless \u2014 this one included. It needs a person, a dermatoscope, and good light.',consider:null,distinguish:'Direct examination, often dermoscopy, sometimes a biopsy.',bring:['A photo with a ruler beside it','A photo from directly above in daylight','When you first noticed it and what changed','Any older photos, even accidental ones'],clin:{ranked:['Melanoma','Basal cell carcinoma','Squamous cell carcinoma','Seborrhoeic keratosis','Benign naevus'],against:'Nothing in the history can exclude the first three.',danger:'Never name it for the patient. Never call it a mole. Never say benign. Examine it.'}},
 'T-HS':{tier:'prompt',why:'Recurring painful lumps in the armpits, groin, or under the breasts \u2014 especially with tunnels or scarring \u2014 is a specific condition mistaken for boils for years before it is named. Early treatment changes the course.',consider:['Hidradenitis suppurativa','Abscess','Infected cyst'],distinguish:'Where the lumps recur, whether they connect under the skin, and scarring.',bring:['Photos','How many episodes over how many years','Family history'],clin:{ranked:['Hidradenitis suppurativa','Recurrent furunculosis','Epidermoid cysts'],against:'A single episode without recurrence or scarring argues against HS.',danger:'Mean delay to diagnosis is years. Stage, treat, refer \u2014 repeated I&D is not management. '+ATLAS}},
 'T-NODULE':{tier:'prompt',why:'Lumps under the skin are hard to assess from the surface and impossible from a photo.',consider:['Cyst','Inflamed hair follicle','Lipoma','Other lumps needing examination'],distinguish:'How it feels \u2014 mobile or fixed, tender or not, growing or stable. Someone needs to touch it.',bring:['Photos','How long, and whether growing','Whether painful'],clin:{ranked:['Epidermoid cyst','Lipoma','Furuncle','Erythema nodosum'],against:'Fixed, hard, or rapidly growing lesions change the differential entirely.',danger:'Erythema nodosum is a sign, not a diagnosis \u2014 look for the cause.'}},
 'T-FLAT':{tier:'handoff',why:'Flat discolored areas level with the skin have a wide range of causes, mostly sorted out by history and examination rather than appearance.',consider:['Drug reaction','Pigment change after inflammation','Viral rash','Other flat rashes'],distinguish:'What came before it, exposures, and whether it blanches under pressure.',bring:['Daylight photos','Medication list with start dates','Whether it blanches under a pressed glass'],clin:{ranked:['Post-inflammatory hyperpigmentation','Viral exanthem','Morbilliform drug eruption','Pityriasis rosea'],against:'Non-blanching is a different pathway \u2014 that is the gate.',danger:'Morbilliform + new drug + fever or facial edema is DRESS until excluded. '+ATLAS}},
 'T-RAISED':{tier:'handoff',why:'Raised bumps have many causes. This tool has narrowed them somewhat, but not to one.',consider:['Eczema','Folliculitis','Insect bites','Viral rashes'],distinguish:'Distribution, what preceded it, itch, and how it evolves over a fortnight.',bring:['Photos close and distant','Duration and change','Medication list'],clin:{ranked:['Papular eczema','Folliculitis','Bite reaction','Viral exanthem','Lichen planus'],against:'\u2014',danger:'If unresolved in two weeks it is a different problem \u2014 re-examine, do not re-prescribe.'}},

 /* ---- respiratory ---- */
 'T-URTI':{tier:'handoff',why:'A cough with sore throat and a runny nose, mostly above the neck, is the pattern of an ordinary viral upper-respiratory infection. It is not something a tool can name for certain, and most run their course \u2014 but the reason to be seen is to check the few things that mimic it.',consider:['Common cold','Sinus infection','Strep throat','Allergic rhinitis'],distinguish:'Fever pattern, how long, and whether it is settling or worsening.',bring:['How many days','Fever readings','Whether symptoms are improving or worsening'],clin:{ranked:['Viral URTI','Acute bacterial sinusitis','Streptococcal pharyngitis','Allergic rhinitis'],against:'Above-the-neck, self-limiting course favours viral.',danger:'Worsening after initial improvement (double-sickening) suggests bacterial sinusitis. Screen Centor for strep.'}},
 'T-LRTI':{tier:'urgent',why:'A cough with fever and colored phlegm can be a chest infection, and the point of being seen today is that a clinician can listen to your chest and check your oxygen \u2014 neither of which a questionnaire can do.',consider:['Chest infection','Pneumonia','Bronchitis','Flu'],distinguish:'A chest examination and oxygen reading. This is exactly what cannot be done remotely.',bring:['How many days, and the fever pattern','Any breathlessness at rest','Your medication list'],clin:{ranked:['Community-acquired pneumonia','Acute bronchitis','Influenza','COVID-19'],against:'Bronchitis usually lacks focal signs; pneumonia may not.',danger:'Check respiratory rate and saturations. CRB-65 informs admission.'}},
 'T-WHEEZE':{tier:'urgent',why:'A cough with wheeze, or on a background of asthma, needs a same-day assessment of how well air is actually moving \u2014 something only an examination can establish.',consider:['Asthma flare','Viral-triggered wheeze','Bronchitis'],distinguish:'Peak flow, chest examination, and oxygen reading.',bring:['Your inhalers','Peak-flow readings if you have them','How often you are using a reliever'],clin:{ranked:['Asthma exacerbation','Viral-induced bronchospasm','COPD flare'],against:'\u2014',danger:'Silent chest, exhaustion, or saturations below 92% is an emergency, not a clinic visit.'}},
 'T-COUGH-SUBACUTE':{tier:'prompt',why:'A cough lasting three to eight weeks often lingers after an infection, but at this length it is worth a proper look to rule out the handful of causes that need action.',consider:['Post-viral cough','Post-nasal drip','Cough-variant asthma','Reflux'],distinguish:'What triggers it, when it is worst, and associated symptoms.',bring:['When it started and after what','What makes it better or worse','Your medication list, especially blood-pressure tablets'],clin:{ranked:['Post-infectious cough','Upper-airway cough syndrome','Cough-variant asthma','GERD','ACE-inhibitor cough'],against:'\u2014',danger:'Always review for an ACE inhibitor. Weight loss, hemoptysis, or smoking history changes the workup.'}},
 'T-COUGH-CHRONIC':{tier:'prompt',why:'A cough lasting more than eight weeks is defined as chronic and deserves a structured assessment rather than another course of anything.',consider:['Asthma','Reflux','Post-nasal drip','Medication side-effect'],distinguish:'The classic trio \u2014 asthma, reflux, post-nasal drip \u2014 plus a medication review.',bring:['How long, exactly','Smoking history','Full medication list'],clin:{ranked:['Cough-variant asthma','GERD','Upper-airway cough syndrome','ACE-inhibitor cough','Bronchiectasis'],against:'\u2014',danger:'Red flags \u2014 hemoptysis, weight loss, smoker over 40 \u2014 warrant imaging. Stop any ACE inhibitor.'}},

 /* ---- GI ---- */
 'T-GERD':{tier:'handoff',why:'Burning behind the breastbone that is worse lying down is the classic pattern of acid reflux. It is common and manageable \u2014 the reason to be seen is to confirm it and check the few things that look similar.',consider:['Acid reflux','Gastritis','Inflammation of the food pipe','Heart-related pain'],distinguish:'What triggers it, timing with meals, and whether anything about it feels like exertional chest pain.',bring:['When it happens relative to meals and lying down','What you have tried','Your medication list'],clin:{ranked:['GERD','Gastritis','Esophagitis','Peptic ulcer'],against:'Positional, post-prandial burning favours reflux.',danger:'Never assume reflux over cardiac pain in anyone with risk factors. Alarm features \u2014 dysphagia, weight loss, anemia, GI bleeding \u2014 need endoscopy.'}},
 'T-IBS':{tier:'handoff',why:'Crampy pain with bloating and a change in bowel habit is a common pattern, but it is a diagnosis reached by excluding others \u2014 which is why it should be assessed rather than assumed.',consider:['Irritable bowel syndrome','Celiac disease','Inflammatory bowel disease','Food intolerance'],distinguish:'Relation to eating and to bowel movements, and any alarm features.',bring:['A symptom and food diary if you can','Any blood in the stool','Family history of bowel disease'],clin:{ranked:['IBS','Celiac disease','IBD','Functional dyspepsia'],against:'IBS requires the absence of alarm features.',danger:'Rectal bleeding, weight loss, nocturnal symptoms, onset over 50, or anemia is not IBS until proven otherwise.'}},
 'T-GASTRO':{tier:'handoff',why:'Short-lived diarrhea or vomiting, with fluids staying down, is usually a self-limiting stomach bug. The reason to check in is dehydration and the few causes that need more.',consider:['Viral gastroenteritis','Food poisoning','A medication effect'],distinguish:'How long, whether you can keep fluids down, and blood in the stool.',bring:['How long, and how often','Whether you can keep fluids down','Recent travel or suspect food'],clin:{ranked:['Viral gastroenteritis','Bacterial food poisoning','Medication-induced'],against:'\u2014',danger:'Bloody diarrhea, high fever, or dehydration changes management. Consider C. difficile with recent antibiotics.'}},
 'T-CDIFF':{tier:'urgent',why:'Diarrhea after recent antibiotics or a hospital stay needs prompt assessment, because one specific and treatable infection behaves this way and needs testing.',consider:['Antibiotic-associated diarrhea','C. difficile infection','Viral gastroenteritis'],distinguish:'A stool test. This cannot be sorted out without one.',bring:['Which antibiotics, and when','How many times a day','Any fever or belly pain'],clin:{ranked:['C. difficile colitis','Antibiotic-associated diarrhea','Coincident viral gastroenteritis'],against:'\u2014',danger:'Stop the offending antibiotic if possible; test for C. diff toxin. Fever, severe pain, or distension suggests colitis.'}},
 'T-VOMIT-DEHYD':{tier:'urgent',why:'Vomiting where nothing will stay down risks dehydration and needs a same-day look, which a questionnaire cannot substitute for.',consider:['Severe gastroenteritis','A blockage','A cause outside the gut'],distinguish:'Whether the belly is soft, whether stool and gas are passing, and hydration.',bring:['How long, and how often','Whether any fluid stays down','Any belly swelling'],clin:{ranked:['Severe gastroenteritis','Bowel obstruction','Extra-abdominal cause'],against:'\u2014',danger:'Bilious vomiting, distension, or absent flatus is obstruction. Assess hydration and electrolytes.'}},
 'T-GI-CHRONIC':{tier:'prompt',why:'Digestive symptoms lasting weeks are past the point of a passing bug and deserve a structured assessment.',consider:['Inflammatory bowel disease','Celiac disease','IBS','Other causes needing tests'],distinguish:'Duration, weight change, blood, and family history.',bring:['A symptom timeline','Any weight loss or blood','Family history'],clin:{ranked:['IBD','Celiac disease','IBS','Malignancy'],against:'\u2014',danger:'Weight loss, bleeding, anemia, or nocturnal symptoms warrant workup, not reassurance.'}},

 /* ---- urinary ---- */
 'T-UTI-SIMPLE':{tier:'handoff',why:'Burning, frequency, and urgency in an otherwise-well non-pregnant woman is the classic pattern of an uncomplicated bladder infection \u2014 one of the few things well suited to being managed quickly. The reason to be seen is to confirm it and rule out the look-alikes.',consider:['Bladder infection','Vaginal irritation or thrush','A sexually transmitted infection','Bladder irritation without infection'],distinguish:'Whether there is any vaginal discharge or irritation, which points elsewhere.',bring:['Exactly which symptoms, and since when','Any vaginal discharge or itch','Any previous infections'],clin:{ranked:['Uncomplicated cystitis','Vulvovaginitis','Urethritis / STI','Interstitial cystitis'],against:'Absence of vaginal symptoms with classic dysuria gives ~90% probability of UTI.',danger:'Vaginal discharge redirects to STI/vaginitis. Culture is not needed for uncomplicated cystitis but is for the exclusions.'}},
 'T-UTI-RECUR':{tier:'prompt',why:'Three or more urinary infections in a year is a pattern worth investigating rather than just treating again, and it deserves a culture and a proper look.',consider:['Recurrent uncomplicated UTI','An underlying cause','Something mimicking recurrent infection'],distinguish:'A urine culture, and a review of the pattern.',bring:['Dates of previous infections','What treatments were used','Any link to intercourse or a diaphragm'],clin:{ranked:['Recurrent uncomplicated UTI','Structural or functional abnormality','Non-infective mimic'],against:'\u2014',danger:'Culture each episode. Consider imaging or referral if there are structural concerns.'}},
 'T-UTI-COMPLEX':{tier:'prompt',why:'Urinary symptoms in a man, or with a catheter or after a recent procedure, are not counted as \u201Cuncomplicated\u201D and need a fuller assessment, including a culture.',consider:['Complicated urinary infection','Prostate involvement','A catheter-related infection'],distinguish:'A culture, and an examination.',bring:['Your symptoms and their timing','Any catheter or recent procedure','Your medication list'],clin:{ranked:['Complicated UTI','Prostatitis','Catheter-associated UTI'],against:'\u2014',danger:'Men and catheterised patients warrant culture and often longer courses. Consider prostatitis with perineal pain or fever.'}},

 /* ---- headache ---- */
 'T-TENSION':{tier:'handoff',why:'Band-like pressure across both sides is the pattern of a tension-type headache \u2014 the most common kind. It is not something a tool should name with certainty, and the reason to be seen is to confirm the pattern and rule out the few things that imitate it.',consider:['Tension headache','Medication-overuse headache','Eye strain','Neck-related headache'],distinguish:'How often, how many days a week you take painkillers, and what triggers it.',bring:['How often, and how long each lasts','How many days a week you take painkillers','Your sleep and stress pattern'],clin:{ranked:['Tension-type headache','Medication-overuse headache','Cervicogenic headache'],against:'Bilateral, non-throbbing, no autonomic features favours tension type.',danger:'Painkillers on more than 10\u201315 days a month drive medication-overuse headache. Any red flag overrides this.'}},
 'T-MIGRAINE':{tier:'handoff',why:'One-sided throbbing with light sensitivity or nausea fits the pattern of migraine, which has effective treatments \u2014 but it is worth confirming, because a first or changed severe headache is assessed differently.',consider:['Migraine','Tension headache','Cluster headache','A secondary cause'],distinguish:'Whether there is a warning aura, how long attacks last, and family history.',bring:['A headache diary if you have one','Any warning signs before it starts','Family history of migraine'],clin:{ranked:['Migraine with or without aura','Tension-type headache','Secondary headache'],against:'Recurrent stereotyped attacks with photophobia favour migraine.',danger:'A first or worst migraine, or new aura over 50, needs to exclude a secondary cause.'}},
 'T-CLUSTER':{tier:'urgent',why:'Severe pain around one eye with a blocked nose or tearing on that side can be a cluster headache, which is both intensely painful and specifically treatable \u2014 and worth being seen for promptly.',consider:['Cluster headache','Migraine','A sinus cause','Something behind the eye'],distinguish:'The one-sided eye and nose features, and the timing of attacks.',bring:['How long attacks last and how often','The one-sided eye or nose symptoms','What you have tried'],clin:{ranked:['Cluster headache','Other trigeminal autonomic cephalalgia','Migraine'],against:'Strictly unilateral with cranial autonomic features favours a TAC.',danger:'First presentation should exclude a secondary cause; imaging is often warranted.'}},
 'T-SINUS':{tier:'handoff',why:'Facial pressure with congestion, especially with a cold, is often sinus-related. Most settle, and the reason to be seen is the timeline \u2014 how long, and whether it is worsening rather than settling.',consider:['Sinus infection','A viral cold','Migraine felt in the face','Dental cause'],distinguish:'How many days, and whether it worsened after first improving.',bring:['How many days of symptoms','Whether it improved then worsened','Any tooth pain'],clin:{ranked:['Acute viral rhinosinusitis','Acute bacterial rhinosinusitis','Migraine','Dental origin'],against:'Under 10 days and improving favours viral.',danger:'Worsening after improvement, or over 10 days, suggests bacterial. Orbital swelling or vision change is an emergency.'}},
 'T-HEAD-NEW':{tier:'prompt',why:'A headache that is new for you, or clearly different from your usual, is worth a proper assessment even when nothing alarming stands out \u2014 the change itself is the reason.',consider:['A new primary headache','A secondary cause','A medication effect'],distinguish:'What is different, when it started, and any associated symptoms.',bring:['How it differs from before','When and how it started','Your medication list'],clin:{ranked:['New primary headache','Secondary headache','Medication effect'],against:'\u2014',danger:'New headache over 50, on anticoagulation, immunosuppressed, or progressive warrants imaging.'}},

 /* ---- MSK ---- */
 'T-BACK-MECH':{tier:'handoff',why:'Back pain over days to weeks after a strain, without warning signs, is usually mechanical and tends to improve. The reason to be seen is to confirm there are no features that need more.',consider:['Muscular or mechanical back pain','A disc-related strain','Nothing needing a scan'],distinguish:'What eases and worsens it, and whether pain travels down a leg.',bring:['What brought it on','What eases and worsens it','Whether pain travels below the knee'],clin:{ranked:['Mechanical low-back pain','Lumbar strain','Discogenic pain'],against:'Absence of red flags and a clear mechanical trigger favours simple back pain.',danger:'Imaging is not indicated early without red flags. Neurological deficit changes that.'}},
 'T-BACK-CHRONIC':{tier:'prompt',why:'Back pain lasting more than six weeks is past the point where simple strain is the whole story, and a structured assessment is worthwhile.',consider:['Chronic mechanical back pain','A structural cause','An inflammatory cause'],distinguish:'The pattern over time and any features suggesting inflammation.',bring:['How long, and how it has changed','What helps','Morning stiffness duration'],clin:{ranked:['Chronic mechanical back pain','Degenerative disease','Inflammatory back pain'],against:'\u2014',danger:'Screen for inflammatory features and for the standard red flags at every review.'}},
 'T-BACK-INFLAM':{tier:'prompt',why:'Back pain that is worse at night or comes with prolonged morning stiffness can point to an inflammatory cause, which is assessed and treated differently from ordinary back pain.',consider:['Inflammatory back pain','Ankylosing spondylitis','Mechanical pain with stiffness'],distinguish:'Morning stiffness over an hour, improvement with movement, age of onset.',bring:['How long morning stiffness lasts','Whether movement helps or worsens it','Family history of spondyloarthritis'],clin:{ranked:['Axial spondyloarthritis','Mechanical back pain','Other inflammatory cause'],against:'Inflammatory features \u2014 stiffness over an hour, improvement with activity, onset under 45 \u2014 favour spondyloarthritis.',danger:'Refer for inflammatory workup; do not manage as mechanical.'}},
 'T-MONOARTH':{tier:'urgent',why:'A single painful joint needs a same-day look, because one cause \u2014 infection in the joint \u2014 is a can\u2019t-miss and needs urgent action.',consider:['Gout','A joint infection','A crystal or reactive cause','Injury'],distinguish:'Whether the joint is hot and whether you can use it, and any fever.',bring:['Which joint, and how it started','Any fever','History of gout'],clin:{ranked:['Gout','Septic arthritis','Pseudogout','Reactive arthritis'],against:'\u2014',danger:'A hot swollen joint with fever is septic arthritis until aspirated. That is the urgency.'}},
 'T-POLYARTH':{tier:'prompt',why:'Pain in many joints on both sides deserves a structured assessment, since several treatable inflammatory conditions present this way.',consider:['Rheumatoid arthritis','A viral cause','Other inflammatory arthritis','Osteoarthritis'],distinguish:'Which joints, symmetry, morning stiffness, and any rash or recent illness.',bring:['Which joints, and the pattern','Morning stiffness duration','Any rash or recent infection'],clin:{ranked:['Rheumatoid arthritis','Viral polyarthritis','Psoriatic arthritis','Osteoarthritis'],against:'Symmetric small-joint involvement with prolonged stiffness favours inflammatory.',danger:'Early inflammatory arthritis benefits from prompt referral \u2014 the window matters.'}},

 /* ---- eye ---- */
 'T-EYE-ALLERGY':{tier:'handoff',why:'Both eyes itchy and watery, often with a runny nose, fits allergic conjunctivitis. It is common and manageable, and the reason to be seen is to confirm it rather than something needing different care.',consider:['Allergic conjunctivitis','Viral conjunctivitis','Dry eye'],distinguish:'Itch is the hallmark; whether it is seasonal or triggered.',bring:['Whether both eyes are affected','Any triggers or seasonality','Whether vision is affected \u2014 it should not be'],clin:{ranked:['Allergic conjunctivitis','Viral conjunctivitis','Dry-eye disease'],against:'Bilateral itch without vision change favours allergy.',danger:'Any vision change, pain, or photophobia is not this \u2014 that is the gate.'}},
 'T-EYE-CONJ':{tier:'handoff',why:'One gritty eye with sticky discharge is usually conjunctivitis, most often viral. The reason to be seen is to distinguish the causes and rule out anything affecting vision.',consider:['Viral conjunctivitis','Bacterial conjunctivitis','A foreign body','Blepharitis'],distinguish:'Discharge type, whether one or both eyes, and any vision change.',bring:['One eye or both','Type of discharge','Whether vision is affected'],clin:{ranked:['Viral conjunctivitis','Bacterial conjunctivitis','Foreign body','Blepharitis'],against:'Normal vision, no pain, no photophobia keeps this benign.',danger:'Pain, photophobia, reduced vision, or contact-lens use changes everything \u2014 examine for keratitis.'}},
 'T-EYE-LID':{tier:'handoff',why:'A tender lump on the eyelid is usually a stye or a blocked gland. It generally settles, and the reason to be seen is to confirm and guide simple care.',consider:['Stye','Chalazion','Lid-margin inflammation'],distinguish:'Where on the lid, tender or not, and how long.',bring:['Photos','How long it has been there','Whether it is painful'],clin:{ranked:['Hordeolum','Chalazion','Blepharitis'],against:'\u2014',danger:'Spreading redness onto the cheek or lid swelling shutting the eye suggests orbital/periorbital cellulitis \u2014 urgent.'}},
 'T-EYE-CL':{tier:'urgent',why:'A red, sore eye in a contact-lens wearer needs a same-day look, because a lens-related corneal infection can threaten sight quickly.',consider:['Contact-lens-related infection','A corneal abrasion','Conjunctivitis'],distinguish:'An examination with fluorescein \u2014 not possible remotely.',bring:['Stop wearing the lens now, and bring it in its case','When it started','Your lens routine'],clin:{ranked:['Microbial keratitis','Corneal abrasion','CL-related conjunctivitis'],against:'\u2014',danger:'Assume keratitis until examined. Do not prescribe steroid drops. Same-day slit-lamp.'}},

 /* ---- ENT ---- */
 'T-EAR':{tier:'handoff',why:'Earache is common and often settles, and the causes differ between ages and situations. The reason to be seen is to look inside the ear \u2014 which a questionnaire cannot do.',consider:['Middle-ear infection','Outer-ear infection','Referred pain','Wax'],distinguish:'A look inside the ear canal and drum.',bring:['How long, and which ear','Any discharge or hearing change','Recent water exposure'],clin:{ranked:['Otitis media','Otitis externa','Referred pain','Cerumen impaction'],against:'\u2014',danger:'Pain behind the ear with swelling and a pushed-forward ear suggests mastoiditis \u2014 urgent.'}},
 'T-THROAT':{tier:'handoff',why:'A sore throat is usually viral and self-limiting. The reason to be seen is to check the handful that are not, and to see whether antibiotics are actually warranted.',consider:['Viral pharyngitis','Strep throat','Glandular fever','Tonsillitis'],distinguish:'Fever, whether there is a cough (its absence points more to strep), and gland swelling.',bring:['How many days','Whether you have a cough','Any difficulty swallowing'],clin:{ranked:['Viral pharyngitis','Streptococcal pharyngitis','Infectious mononucleosis'],against:'A cough and runny nose point away from strep.',danger:'Drooling, muffled voice, or trouble swallowing saliva is the emergency gate \u2014 not this node.'}},

 /* ---- generic ---- */
 'T-HANDOFF-GENERIC':{tier:'handoff',why:'This tool only covers a handful of common problems, and it does not recognize what you are describing well enough to sort it. That is not reassuring or worrying either way \u2014 it just means a person should hear the whole story.',consider:null,distinguish:'A clinician taking a full history \u2014 which is the right next step for anything a short questionnaire cannot map.',bring:['A short note of what you have noticed, and when it started','How it has changed','Your medication list'],clin:{ranked:['Undifferentiated presentation \u2014 full history required'],against:'The tool could not map the complaint to a defined pathway. Closure rule invoked.',danger:'Undifferentiated symptoms are not low-risk by default. Take a complete history.'}}
};

const app=document.getElementById('app'), traceEl=document.getElementById('trace'), progEl=document.getElementById('prog');
let state={trace:[],sys:null,gateChecked:false,depth:0};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function drawTrace(){
 if(!state.trace.length){traceEl.hidden=true;return}
 traceEl.hidden=false;
 traceEl.innerHTML='PATH <span class="s">\u203A</span> '+state.trace.map(t=>`<b>${esc(t)}</b>`).join(' <span class="s">\u203A</span> ');
}
function setProg(){ progEl.style.width=Math.min(state.depth*16,92)+'%'; }
function push(t){ if(t){state.trace.push(t);drawTrace();} state.depth++; setProg(); }
function scroll(){ window.scrollTo({top:0,behavior:'instant'}); }

function go(id,tr){
 push(tr);
 if(id.startsWith('gate:')){ state.sys=id.slice(5); return renderGate(); }
 if(id.startsWith('skin:')){ return renderSkin(id.slice(5)); }
 if(N[id]) return renderTerminal(id);
 if(STEPS[id]) return renderStep(id);
 renderTerminal('T-HANDOFF-GENERIC');
}

function renderHome(){
 state={trace:[],sys:null,gateChecked:false,depth:0}; drawTrace(); setProg();
 app.innerHTML=`<div class="step">
  <div class="home-hero">
   <div class="ht">
    <div class="eyebrow">Guided intake · demo</div>
    <h1>This won't tell you what you have.</h1>
    <p class="lede wide">It asks a few questions about your body, your mind, and what you are carrying — checks for anything that needs quick attention, and hands you a summary to bring to a clinician or counselor. It never diagnoses, and it never tells you to stay home. The mental, alcohol, smoking, and meaning paths use validated screening tools, not guesses.</p>
   </div>
   <div class="hi">${typeof HERO!=='undefined'?HERO:''}</div>
  </div>
  <div class="nlbox">
   <label class="nllabel" for="nlq">Tell me what's going on — in your own words</label>
   <textarea id="nlq" class="nlq" rows="2" placeholder="e.g. “burning when I pee,” “headache for three days,” “I've been really down lately,” “I want to quit smoking”"></textarea>
   <button class="primary" id="nlgo">Continue</button>
   <div id="nlout" class="nlout"></div>
  </div>
  <div class="nlor">or browse by area</div>
  ${(typeof SYS_CATS!=='undefined'?SYS_CATS:[]).map(cat=>`<div class="catsec">
    <div class="cathead" style="color:${cat.tint}">${esc(cat.label)}</div>
    <div class="sysgrid">${cat.ids.map(id=>{const i=SYSTEMS.findIndex(s=>s.id===id);if(i<0)return'';const s=SYSTEMS[i];return `<button class="sys" data-i="${i}" style="--tint:${cat.tint};--tintbg:${cat.bg}"><span class="ic">${SYSICON[s.ic]||''}</span><span class="st">${esc(s.t)}</span><span class="ss">${esc(s.s)}</span></button>`;}).join('')}</div>
   </div>`).join('')}
  <div class="foot">üMed · DEMO BUILD v3.7 · 22 SYSTEMS · NOT FOR CLINICAL USE<br>Architecture demonstration. Screening tools shown for illustration; terminal content requires clinician sign-off before any real use.<br>üMed logo © Daniel &amp; Nathan Hekman 2014</div>
 </div>`;
 app.querySelectorAll('.sys').forEach(b=>b.onclick=()=>{const s=SYSTEMS[+b.dataset.i];go(s.go,'SYS:'+s.id.toUpperCase())});
 const nlq=document.getElementById('nlq');
 if(nlq){
  const submit=()=>{ if(typeof handleNL==='function') handleNL(nlq.value); };
  document.getElementById('nlgo').onclick=submit;
  nlq.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); } });
  nlq.addEventListener('input',()=>{ if(typeof nlLiveSuggest==='function') nlLiveSuggest(nlq.value); });
 }
 scroll();
}

function renderGate(){
 const extra=GATE_EXTRA[state.sys]||[];
 const crisis=(typeof GATE_CRISIS!=='undefined'&&GATE_CRISIS[state.sys])||[];
 const systitle=(SYSTEMS.find(x=>x.id===state.sys)||{}).t||'this area';
 const basis=(typeof SYS_BASIS!=='undefined'&&SYS_BASIS[state.sys])||'';
 app.innerHTML=`<div class="step">
  <button class="back" id="bk">\u2190 Back</button>
  ${state.nlText?`<div class="nlnote">From what you wrote \u2014 \u201c${esc(state.nlText)}\u201d \u2014 this looks like <b>${esc(systitle)}</b>. Not right? Use \u2190 Back to choose another area.</div>`:''}
  <div class="eyebrow">First \u2014 the things that cannot wait</div>
  <h2>Do any of these apply right now?</h2>
  <p class="lede">Tick everything that is true. If you are unsure about one, tick it.</p>
  ${crisis.length?`<div class="checks crisischecks">
   <div class="ck-cap">If any of these are true right now</div>
   ${crisis.map(([k,l])=>`<label class="check"><input type="checkbox" data-c="${k}"><span>${esc(l)}</span></label>`).join('')}
  </div>`:''}
  <div class="checks">
   ${GATE_UNIVERSAL.map(([k,l])=>`<label class="check"><input type="checkbox" data-g="${k}"><span>${esc(l)}</span></label>`).join('')}
   ${extra.map(([k,l])=>`<label class="check"><input type="checkbox" data-g="${k}"><span>${esc(l)}</span></label>`).join('')}
  </div>
  <div class="checks">
   <div class="ck-cap">And about you</div>
   ${HOST.map(([k,l])=>`<label class="check"><input type="checkbox" data-h="${k}"><span>${esc(l)}</span></label>`).join('')}
  </div>
  <button class="primary" id="nx">Continue</button>
  ${basis?`<details class="evidence gatebasis"><summary>Clinical basis for this pathway</summary><div class="det"><p style="font-size:.82rem;color:var(--muted);line-height:1.55;margin:0">${esc(basis)}</p><p class="path">The question sequence for this system is anchored to the algorithm above; individual terminal nodes carry their own citations.</p></div></details>`:''}
  ${(typeof ALGO!=='undefined'&&ALGO[state.sys])?`<button class="algolink" id="algo">▸ See the full clinical algorithm this follows</button>`:''}
 </div>`;
 document.getElementById('bk').onclick=renderHome;
 { const al=document.getElementById('algo'); if(al) al.onclick=()=>renderAlgo(state.sys); }
 document.getElementById('nx').onclick=()=>{
  const cris=[...document.querySelectorAll('[data-c]')].filter(i=>i.checked);
  const red=[...document.querySelectorAll('[data-g]')].filter(i=>i.checked);
  const host=[...document.querySelectorAll('[data-h]')].filter(i=>i.checked);
  if(cris.length){push('CRISIS:'+cris.map(i=>i.dataset.c.toUpperCase()).join('+'));return renderTerminal((typeof CRISIS_GATE!=='undefined'&&CRISIS_GATE[state.sys])||'T-GATE-EMERGENT');}
  if(red.length){push('GATE:'+red.map(i=>i.dataset.g.toUpperCase()).join('+'));return renderTerminal('T-GATE-EMERGENT');}
  if(host.length){push('HOST:'+host.map(i=>i.dataset.h.toUpperCase()).join('+'));return renderTerminal('T-GATE-HOST');}
  push('GATE:CLEAR');
  if(state.sys==='skin') return renderSkin('scan');
  renderStep(SYS_ENTRY[state.sys]);
 };
 scroll();
}

function renderStep(id){
 const s=STEPS[id];
 if(!s) return renderTerminal('T-HANDOFF-GENERIC');
 const head=`<button class="back" id="bk">\u2190 Back</button>
  ${s.eyebrow?`<div class="eyebrow">${esc(s.eyebrow)}</div>`:''}<h2>${esc(s.q)}</h2>${s.lede?`<p class="lede wide">${esc(s.lede)}</p>`:''}`;
 if(s.scale){
  const sc=s.scale;
  app.innerHTML=`<div class="step">${head}
   ${sc.instrument?`<div class="instrument-tag">${esc(sc.instrument)}</div>`:''}
   <div class="scale">${sc.items.map((raw,i)=>{const it=(typeof raw==='string')?{t:raw,options:sc.options}:raw;return `
    <div class="scaleitem"><div class="scaleq">${i+1}. ${esc(it.t)}</div>
     <div class="scaleopts">${it.options.map(o=>`<label class="pill"><input type="radio" name="it${i}" value="${o.v}"><span>${esc(o.t)}</span></label>`).join('')}</div></div>`;}).join('')}
   </div>
   <button class="primary" id="nx">${esc(sc.cta||'See what this suggests')}</button>
   <p class="note" id="scwarn" style="margin-top:.7rem;color:var(--sig);display:none">Please answer every item \u2014 a screening score is only meaningful when it is complete.</p>
  </div>`;
  document.getElementById('nx').onclick=()=>{
   let total=0,answered=0,critVal=0;
   sc.items.forEach((it,i)=>{
    const sel=document.querySelector(`input[name="it${i}"]:checked`);
    if(sel){answered++;const v=+sel.value;total+=v;if(sc.critical===i)critVal=v;}
   });
   if(answered<sc.items.length){document.getElementById('scwarn').style.display='block';return;}
   const tag=sc.instrument||'SCALE';
   if(sc.critical!=null&&critVal>0&&sc.criticalGo){return go(sc.criticalGo,`${tag}:SAFETY-ITEM+`);}
   const band=sc.route.find(r=>total<=r.max)||sc.route[sc.route.length-1];
   if(typeof SCORE_METERS!=='undefined'&&SCORE_METERS[tag]) state.meter={label:tag,total:total,cfg:SCORE_METERS[tag]};
   go(band.go,`${tag}=${total}`);
  };
 }else if(s.cards){
  app.innerHTML=`<div class="step">${head}<div class="cards">${s.cards.map((c,i)=>
   `<button class="card" data-i="${i}">${MORPH[c.m]}<span class="card-t">${esc(c.t)}</span><span class="card-term">${esc(c.term)}</span><span class="card-s">${esc(c.s)}</span></button>`).join('')}</div></div>`;
  app.querySelectorAll('.card').forEach(b=>b.onclick=()=>{const c=s.cards[+b.dataset.i];go(c.go,c.tr)});
 }else{
  app.innerHTML=`<div class="step">${head}<div class="opts">${s.opts.map((o,i)=>
   `<button class="opt" data-i="${i}"><span class="opt-body"><span class="opt-t">${esc(o.t)}</span>${o.s?`<span class="opt-s">${esc(o.s)}</span>`:''}</span><span class="chev">\u2192</span></button>`).join('')}</div></div>`;
  app.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{const o=s.opts[+b.dataset.i];go(o.go,o.tr)});
 }
 document.getElementById('bk').onclick=()=>history.length?location.reload():renderHome();
 scroll();
}

/* gate terminals reuse the generic renderer via inline definitions */
N['T-GATE-EMERGENT']={tier:'emergent',why:'One or more of the things you ticked can be a sign of a condition that gets worse quickly. This tool stops here on purpose \u2014 it is not the place to work that out.'};
N['T-GATE-HOST']={tier:'urgent',why:'Pregnancy, a weakened immune system, or being under 18 changes how quickly a problem needs looking at. This demo is built for non-pregnant adults with normal immune systems, so it stops here and points you to a person.',bring:['A note of your symptoms and when they started','Your full medication list','Anything you have already tried']};

function renderTerminal(id){
 const n=N[id], t=TIERS[n.tier];
 if(state.trace[state.trace.length-1]!=='NODE:'+id) push('NODE:'+id);
 progEl.style.width='100%';

 // Patient-facing ranked differential. Likelihood ordering, but a must-not-miss
 // flag OVERRIDES position so the dangerous-but-unlikely entry is never buried.
 // Ordinal bands only, never percentages.
 let dxBlock='';
 if(n.clin && n.clin.ranked && n.clin.ranked.length){
  const r=n.clin.ranked, last=r.length-1;
  const MUSTNOTMISS=/lymphoma|melanoma|carcinoma|septic arthritis|obstruction|pneumonia|keratitis|cellulitis|pemphigoid|meningo|ectopic|cauda|dress|vasculitis|mastoiditis|cholangitis|zoster|epidural/i;
  const rows=r.map((x,i)=>{
   const isDanger=MUSTNOTMISS.test(x);
   let band,cls;
   if(i===0){band='Most likely';cls='b-high';}
   else if(i>=last&&r.length>2){band='Less likely';cls='b-low';}
   else{band='Consider';cls='b-mid';}
   if(isDanger){band='Must not miss';cls='b-danger';}
   return `<li><span class="band ${cls}">${band}</span><span class="dxname">${esc(x)}</span></li>`;
  }).join('');
  dxBlock=`<div class="block"><h3>What this could be</h3>
   <ul class="dxlist">${rows}</ul>
   <p class="dxnote">Listed by how common each is \u2014 not a diagnosis, and not a probability. \u201CMust not miss\u201D marks something that has to be ruled out even if it is unlikely. Only an examination can tell these apart, which is why the next step is still to be seen.</p></div>`;
 }
 const distinguish=n.distinguish?`<div class="block"><h3>What tells them apart</h3><p style="margin:0">${esc(n.distinguish)}</p></div>`:'';
 const bring=n.bring?`<div class="block"><h3>Bring this to your appointment</h3><ol>${n.bring.map(x=>`<li>${esc(x)}</li>`).join('')}</ol>
   ${state.sys==='skin'?`<h3 style="margin-top:1.1rem">How to photograph it</h3>
   <div class="photoguide"><div class="pg">${PG.wide}<span>Whole area</span></div><div class="pg">${PG.close}<span>Close, in focus</span></div><div class="pg">${PG.scale}<span>Coin for scale</span></div></div>
   <p class="note">Daylight, indirect \u2014 near a window, not under a lamp. No flash, no filters. If it is blurred, take it again.</p>`:''}</div>`:'';

 const cmText = (typeof CANTMISS!=='undefined' && CANTMISS[id]) ? CANTMISS[id] : null;
 const cmBlock = cmText ? `<div class="cantmiss"><div class="cm-h">Cannot miss</div><p>${esc(cmText)}</p></div>` : '';

 // ---- whole-person additions: crisis support box, evidence-based steps, cited evidence base ----
 const supLines = n.support ? (Array.isArray(n.support)?n.support:(n.support.lines||[])) : [];
 const supportBlock = supLines.length ? `<div class="support"><div class="cm-h">${esc((n.support&&n.support.title)||'Reach someone now')}</div>${supLines.map(x=>`<div class="supline">${x}</div>`).join('')}</div>` : '';
 const approachBlock = (n.approach&&n.approach.length) ? `<div class="block"><h3>${esc(n.approachTitle||'Steps with evidence behind them')}</h3><ul class="approach">${n.approach.map(x=>{const g=(typeof x==='string'&&x.slice(0,4)==='grp:');return g?`<li class="grp">${esc(x.slice(4))}</li>`:`<li>${esc(x)}</li>`;}).join('')}</ul></div>` : '';

 // ---- tier-aware self-care: real "try first" advice ONLY on low-acuity tiers;
 //      emergent/urgent get interim measures framed so they never defer care ----
 let scTitle='', scItems=[], scNote='', scEmerg=false;
 const SC   = (typeof SELFCARE!=='undefined') ? SELFCARE : {};
 const SCS  = (typeof SELFCARE_SYS!=='undefined') ? SELFCARE_SYS : {};
 const IES  = (typeof INTERIM_EMERGENT_SYS!=='undefined') ? INTERIM_EMERGENT_SYS : {};
 const IE   = (typeof INTERIM_EMERGENT!=='undefined') ? INTERIM_EMERGENT : [];
 const IU   = (typeof INTERIM_URGENT!=='undefined') ? INTERIM_URGENT : [];
 if(n.tier==='emergent'){
  scEmerg=true; scTitle='While you get help on the way';
  scItems=(IES[state.sys]||[]).concat(IE);
  scNote='These do not replace calling for help — help is already the plan. Do them only while you wait.';
 }else if(n.tier==='urgent'){
  scTitle='While you arrange to be seen today';
  scItems=(SC[id+':urgent']||IU);
  scNote='Comfort measures only. They are not a reason to wait longer than the step above says.';
 }else{
  scTitle='Things you can safely try first';
  scItems = SC[id] || (n.approach&&n.approach.length ? [] : (SCS[state.sys]||[]));
  scNote='General self-care, not a treatment plan. If it is not settling, or anything below changes, still get seen.';
 }
 const selfcareBlock = scItems.length ? `<div class="selfcare${scEmerg?' selfcare-emerg':''}"><div class="sc-h">${esc(scTitle)}</div><ul>${scItems.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><p class="sc-note">${esc(scNote)}</p></div>` : '';
 const evidenceBlock = (n.evidence&&n.evidence.length) ? `<details class="evidence"><summary>The evidence base</summary><div class="det"><ol>${n.evidence.map(x=>`<li>${esc(x)}</li>`).join('')}</ol><p class="path">Screening instruments and guideline references. A screen is not a diagnosis — a clinician interprets it in context.</p></div></details>` : '';
 const action = n.action || t.action;
 const label  = n.label  || t.label;
 const tsub   = (n.tsub!=null) ? n.tsub : (n.tier==='handoff' ? 'Nothing here needs same-day care. That is not the same as ruling anything out.' : '');

 // ---- visual score meter (shown once, on the result page after a scored screen) ----
 let meterBlock='';
 if(state.meter && state.meter.cfg){
  const m=state.meter, cfg=m.cfg, max=cfg.max; let acc=0, bl=cfg.bands[cfg.bands.length-1].label;
  const segs=cfg.bands.map(b=>{const w=((b.upto-acc)/max)*100; acc=b.upto; return `<div class="seg ${b.cls}" style="flex:0 0 ${w}%"><span>${esc(b.label)}</span></div>`;}).join('');
  for(const b of cfg.bands){ if(m.total<=b.upto){bl=b.label;break;} }
  const pos=Math.max(0,Math.min(m.total/max,1))*100;
  meterBlock=`<div class="meter"><div class="meter-head"><span>${esc(m.label)}</span><b>Score ${m.total} / ${max}</b></div>
   <div class="meter-bar">${segs}<div class="meter-mark" style="left:${pos}%"></div></div>
   <div class="meter-cap">Your result falls in the <b>${esc(bl)}</b> range. This is a screen, not a diagnosis — the ranges come from the validated instrument.</div></div>`;
  state.meter=null;
 }

 app.innerHTML=`<div class="step">
  <div class="tier ${t.cls}">
   <div class="tl">${esc(label)}</div>
   <div class="ta">${esc(action)}</div>
   ${tsub?`<div class="tsub">${esc(tsub)}</div>`:''}
  </div>
  ${supportBlock}${meterBlock}
  <p class="why">${esc(n.why)}</p>
  ${n.warn?`<div class="warn"><b>${esc(n.warn)}</b></div>`:''}
  ${dxBlock}${cmBlock}${approachBlock}${selfcareBlock}${distinguish}${bring}${evidenceBlock}
  <div class="safety"><b>Get medical attention regardless of what this tool said if:</b>
   anything gets worse, anything new appears, you develop a fever, you feel unwell overall, or something about this frightens you.</div>
  <button class="restart" id="again">\u21BA Start over</button>

function skinResult(mode,a){
 let tier,label,action,why,warn=null,ranked,approach,tsub;
 const bringMole=['A photo of the spot — plus any older photos that show how it looked before','When you first noticed it and exactly what has changed','Your personal and family history of skin cancer, and sun / tanning-bed exposure'];
 const bringRash=['A photo of the rash and how far it has spread','When it started and how quickly it changed','Anything new — products, foods, medications (bring the box), bites, or travel','Whether you have had a fever'];

 if(mode==='mole'){
  const changing=a.chg==='changed', newish=a.chg==='new', bleed=a.sym==='bleed', uglyY=a.ugly==='yes', anyRisk=a.risk.length>0;
  if(bleed || (changing && (uglyY||anyRisk))){

   ranked=['Melanoma','Atypical (dysplastic) mole','Ordinary mole'];
   why='You described '+[changing?'a spot that is changing':'',bleed?'bleeding or a sore that will not heal':'',uglyY?'a mole that stands out from your others':''].filter(Boolean).join(', ')+'. Those are among the features clinicians watch for, so it should be examined in person soon. Many such spots turn out benign — but neither a photo nor this tool can rule out skin cancer.';
   approach=['Book an appointment soon and say it is a changing or bleeding mole, so it is triaged appropriately.','Photograph it now so any further change is documented.','Do not scratch, pick, or cover it with anything irritating.'];
  } else if(changing||uglyY||newish){
   tier='prompt'; label='Worth getting checked';
   action='Book a routine skin check in the next 1–2 weeks.';
   ranked=['Ordinary mole','Atypical (dysplastic) mole','Melanoma'];
   why='You described '+[newish?'a new spot':'',changing?'some change':'',uglyY?'a mole that looks a little different from your others':''].filter(Boolean).join(', ')+(anyRisk?', along with some personal risk factors':'')+'. Nothing here is an emergency, but a clinician should take a look — change over time is the main thing worth checking.';
   approach=['Book a routine skin check in the next couple of weeks.','Photograph it now next to a coin or ruler, so change can be judged later.','Note anything that changes in the meantime.'];
  } else {
   tier='handoff'; label='Looks routine';
   action='Nothing here needs urgent care — mention it at a routine skin check.';
   ranked=['Ordinary mole (benign nevus)','Seborrheic keratosis','Freckle / sun spot'];
   why='You did not report change, bleeding, or a mole that stands out, which is reassuring, and this has the look of an ordinary spot. This is not a diagnosis — keep a casual eye out, and see someone if it starts to change.'+(anyRisk?' Because you have some skin-cancer risk factors, a periodic full-skin check is still a good idea.':'');
   approach=['Mention it at your next routine visit or skin check.','Take a dated photo so you can compare later.','See someone sooner if it starts to change, bleed, or itch.'];
  }

 } else {

'T-POSTVIRAL':{tier:'handoff',why:'A dry cough that lingers after a cold is common and usually settles over a few weeks. The reason to be seen is to confirm nothing else is going on, not because the cough itself is alarming.',consider:['A cough lingering after a viral infection','Post-nasal drip','Early asthma'],distinguish:'How long it has run, and whether anything else came with it.',bring:['When the cold was, and how the cough has changed since','Whether anything triggers it','Your medication list'],ranked:['Post-infectious cough','Upper-airway cough syndrome','Cough-variant asthma'],against:'A settling course after a clear viral illness favours a post-viral cough.',danger:'If it is not settling by 8 weeks it becomes a chronic cough and the workup changes. Review for an ACE inhibitor.'},
'T-LRTI':{tier:'urgent',why:'A cough with fever and colored phlegm, with feeling unwell, can be a chest infection. The point of being seen today is that a clinician can listen to your chest and check your oxygen — neither of which a questionnaire can do.',consider:['Bronchitis','Chest infection','Flu','Pneumonia'],distinguish:'A chest examination and an oxygen reading. This is exactly what cannot be done remotely.',bring:['How many days, and the fever pattern','Any breathlessness at rest','Your medication list'],ranked:['Community-acquired pneumonia','Acute bronchitis','Influenza','COVID-19'],against:'Bronchitis usually lacks focal chest signs; pneumonia may not.',danger:'Check respiratory rate and saturations. CRB-65 informs whether this is home or hospital.'},
'T-ASTHMA-FLARE':{tier:'urgent',why:'A cough and wheeze on a background of asthma needs a same-day assessment of how well air is actually moving — something only an examination can establish.',warn:'If your reliever inhaler is not lasting four hours, or you are too breathless to speak in full sentences, treat that as an emergency, not a clinic visit.',consider:['An asthma flare','A chest infection setting it off'],distinguish:'Peak flow, a chest examination, and an oxygen reading.',bring:['Your inhalers','Peak-flow readings if you have them','How often you are using the reliever'],ranked:['Asthma exacerbation','Intercurrent chest infection'],against:'—',danger:'A silent chest, exhaustion, or saturations below 92% is an emergency. Do not sit on a deteriorating asthmatic.'},
'T-COPD-FLARE':{tier:'urgent',why:'A change in cough, phlegm, or breathlessness on a background of COPD is a flare, and being seen today lets someone judge severity and whether antibiotics or steroids are needed.',consider:['A COPD flare','A chest infection'],distinguish:'Chest examination, oxygen, and how far it has moved from your baseline.',bring:['Your inhalers and any rescue pack','Your usual baseline breathlessness','How the phlegm has changed'],ranked:['COPD exacerbation','Pneumonia','Heart failure contributing'],against:'—',danger:'CO2 retention can make a COPD patient drowsy — that is an emergency. Beware giving high-flow oxygen without care.'},
'T-WHEEZE-NEW':{tier:'urgent',why:'New wheeze that you have never had before deserves a same-day look, because the cause matters and some causes need prompt treatment.',consider:['New asthma','A chest infection with wheeze','An inhaled irritant'],distinguish:'Examination, peak flow, and the story of how it started.',bring:['When it started and what you were doing','Any allergies or triggers','Your medication list'],ranked:['New-onset asthma','Viral bronchospasm','Inhaled irritant or allergen'],against:'—',danger:'Sudden wheeze with lip or throat swelling is anaphylaxis — the gate at the start. New unilateral wheeze can be an inhaled foreign body or a mass.'},
'T-COUGH-SUBACUTE':{tier:'prompt',why:'A cough lasting three to eight weeks often lingers after an infection, but at this length it is worth a proper look to rule out the handful of causes that need action.',consider:['Cough-variant asthma','Post-nasal drip','Post-viral cough','Reflux'],distinguish:'What triggers it, when it is worst, and what came before it.',bring:['When it started and after what','What makes it better or worse','Your medication list, especially blood-pressure tablets'],ranked:['Post-infectious cough','Upper-airway cough syndrome','Cough-variant asthma','GERD'],against:'—',danger:'Always review for an ACE inhibitor. Hemoptysis, weight loss, or a smoking history changes the workup.'},

'T-CLUSTER':{tier:'urgent',why:'Severe pain around one eye with tearing or a blocked nostril on that side can be a cluster headache — intensely painful and specifically treatable — and worth being seen for promptly.',consider:['Cluster headache','Migraine','A cause behind the eye'],distinguish:'The one-sided eye and nose features, and the timing of attacks.',bring:['How long attacks last and how often','The one-sided eye or nose symptoms','What you have tried'],ranked:['Cluster headache','Other trigeminal autonomic cephalalgia','Migraine'],against:'Strictly one-sided pain with tearing and nasal blockage favours a trigeminal autonomic headache.',danger:'A first presentation should exclude a secondary cause; imaging is often warranted.'},

'T-HEAD-NEW':{tier:'prompt',why:'A headache that is new for you, without alarm features, is worth a proper assessment simply because it is new — the change itself is the reason to have it checked.',consider:['A new primary headache','A medication effect','An early secondary cause'],distinguish:'What is different, when it started, and any associated symptoms.',bring:['How it differs from before','When and how it started','Your medication list'],ranked:['New primary headache','Medication effect','Secondary headache'],against:'—',danger:'If it becomes progressive, wakes you, or brings any neurological symptom, it moves up urgently.'},
'T-HEAD-SECONDARY':{tier:'urgent',why:'A new headache in someone over 50, on a blood thinner, or one that is worse lying down, wakes you, or is progressing over weeks, carries features that warrant prompt assessment — sometimes including a scan — even when you feel otherwise well.',consider:['A cause needing a scan','Raised pressure inside the head','A blood-vessel cause','Giant cell arteritis'],distinguish:'A proper neurological assessment and, frequently, imaging or blood tests.',bring:['Exactly what is new or different','Your medication list, especially blood thinners','Any visual or neurological symptoms'],ranked:['Secondary headache needing imaging','Giant cell arteritis','Raised intracranial pressure','Primary headache'],against:'The concerning features are the finding; they justify prompt assessment regardless of the leading guess.',danger:'Over 50 with scalp tenderness or jaw claudication is giant cell arteritis — untreated it blinds. Progressive or positional headache needs imaging. On anticoagulation, think bleed.'},

'T-VIRAL-ARTH':{tier:'handoff',why:'Aching in several joints after a recent viral illness, now settling, is often a short-lived reactive process. The reason to be seen is to confirm it is settling and not the start of something persistent.',consider:['A post-viral arthritis','Early inflammatory arthritis','A reactive arthritis'],distinguish:'Whether it is improving, and how long it has run.',bring:['What illness preceded it','Which joints, and whether improving','Any rash or eye symptoms'],ranked:['Viral / reactive arthritis','Early inflammatory arthritis','Reactive arthritis'],against:'A clearly settling course after a viral illness favours a self-limiting process.',danger:'If it does not settle, or becomes persistent and symmetrical, reassess for an inflammatory arthritis.'},

function nlNorm(s){ return (' '+String(s||'').toLowerCase().replace(/'/g,'')+' ').replace(/[^a-z0-9\\s]/g,' ').replace(/\\s+/g,' '); }
function nlRoute(raw){
 const tp=nlNorm(raw); if(tp.trim()==='') return {kind:'empty'};
 if(NL_CRISIS.test(tp)) return {kind:'crisis'};
 if(NL_EMERGENCY.test(tp)) return {kind:'emergency'};
 const scores=NL_LEX.map(e=>({sys:e.sys,n:e.kw.reduce((a,k)=>a+(tp.indexOf(' '+k+' ')>=0?1:0),0)})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
 if(!scores.length) return {kind:'none'};
 const tied=scores.filter(x=>x.n===scores[0].n);
 if(tied.length===1) return {kind:'system',sys:scores[0].sys,all:scores.map(x=>x.sys)};
 return {kind:'ambiguous',all:scores.map(x=>x.sys)};
}
function nlPick(sys,text){ state.nlText=text; go('gate:'+sys,'NL:'+sys.toUpperCase()); }
function handleNL(text){
 const out=document.getElementById('nlout'); if(out) out.innerHTML='';
 const r=nlRoute(text);
 if(r.kind==='empty'){ if(out) out.innerHTML='<p class="nlmsg">Type a few words about what is going on, or browse the areas below.</p>'; return; }
 if(r.kind==='crisis'){ state.sys='mental'; state.nlText=text; push('NL:CRISIS'); return renderTerminal('T-CRISIS-MENTAL'); }
 if(r.kind==='emergency'){ state.nlText=text; push('NL:EMERGENCY'); return renderTerminal('T-GATE-EMERGENT'); }
 if(r.kind==='system'){ return nlPick(r.sys,text); }
 if(!out) return;
 if(r.kind==='ambiguous'){
  const btns=r.all.map(id=>{const s=SYSTEMS.find(x=>x.id===id);return s?`<button data-sys="${id}">${esc(s.t)}</button>`:'';}).join('');
  out.innerHTML=`<p class="nlmsg">A few areas could fit what you wrote — which is closest?</p><div class="nlsug">${btns}</div>`;
  out.querySelectorAll('.nlsug button').forEach(b=>b.onclick=()=>nlPick(b.dataset.sys,text));
 }else{
  out.innerHTML='<p class="nlmsg">I could not tell which area that fits — add a detail, or browse the areas below.</p>';
 }
}
