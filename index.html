function renderAlgo(sys){
 const a=ALGO[sys]; if(!a) return renderGate();
 push('ALGO:'+sys.toUpperCase());
 const TONE={sig:'var(--sig)',amber:'#C0873A',sea:'var(--sea)'};
 const stages=a.stages.map((st,i)=>{
  const items=st.items?`<ul class="algo-list">${st.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'';
  const cards=st.cards?`<div class="algo-cards">${st.cards.map(c=>`<div class="algo-card"><div class="ac-t">${esc(c.t)}</div><div class="ac-s">${esc(c.s)}</div></div>`).join('')}</div>`:'';
  const cite=st.cite?`<div class="algo-cite">${esc(st.cite)}</div>`:'';
  const arrow=i<a.stages.length-1?'<div class="algo-arrow">↓</div>':'';
  return `<div class="algo-stage" style="--tone:${TONE[st.tone]||'var(--sea)'}">
    <div class="algo-kicker">${esc(st.kicker)}</div>
    <div class="algo-head">${esc(st.head)}</div>${items}${cards}${cite}
   </div>${arrow}`;
 }).join('');
 app.innerHTML=`<div class="step algo">
   <button class="back" id="bk">← Back</button>
   <div class="eyebrow">Clinical algorithm</div>
   <h2>${esc(a.title)}</h2>
   <p class="lede wide">${esc(a.intro)}</p>
   <div class="algo-flow">${stages}</div>
   <div class="algo-foot">${esc(a.foot)}</div>
   <div class="algo-actions"><button class="restart" id="algoprint">⎙ Print / save as PDF</button><button class="restart" id="algoback">← Back to the questions</button></div>
 </div>`;
 const back=()=>{ state.sys=sys; renderGate(); };
 document.getElementById('bk').onclick=back;
 document.getElementById('algoback').onclick=back;
 document.getElementById('algoprint').onclick=()=>window.print();
 scroll();
}

const NEV={

 seizure:'A first seizure needs prompt neurological assessment and investigation, and driving restrictions apply (AAN/AES first-seizure guideline, Krumholz A et al. Neurology. 2015;84:1705–1713).',
 neuropathy:'Distal symmetrical (“glove and stocking”) numbness — screen for diabetes, vitamin B12 deficiency, thyroid disease, alcohol and medicines (AAN distal symmetrical polyneuropathy).',
 carpal:'Carpal tunnel syndrome — nocturnal thumb-side hand numbness; a clinical diagnosis, with nerve conduction studies if needed (AAN/AAOS).',
 bells:'Facial weakness — Bell’s palsy weakens the whole side including the forehead; if the forehead is spared (the eyebrow still lifts), suspect a stroke instead (AAO-HNS Bell’s palsy guideline, Baugh RF et al. 2013).',
 cord:'Weakness with a sensory level, or bladder/bowel change, suggests spinal-cord compression or cauda equina — a surgical emergency needing urgent MRI.',
 delirium:'New confusion over hours to days is delirium until proven otherwise — look for infection, medicines, dehydration and metabolic causes (NICE delirium, CG103).',
 dementia:'Gradual memory decline — a structured assessment and a reversible-cause screen (thyroid, B12, mood, sleep, medicines) before any dementia diagnosis (NICE NG97).',
 tremor:'Tremor — distinguish essential tremor (with action), Parkinsonism (rest tremor with slowness and stiffness), and physiological or drug-induced tremor (MDS criteria).',
 syncope:'Syncope — separate benign (vasovagal) from cardiac causes; red flags are syncope on exertion or when lying flat, without warning, with palpitations, or a family history of sudden death (ESC/ACC syncope guidelines).'

/* live topic suggestions as the patient types (topic only; Continue still does full routing) */
function nlLiveSuggest(raw){
 const out=document.getElementById('nlout'); if(!out) return;
 const t=nlNorm(raw);
 if(t.trim().length<2){ out.innerHTML=''; return; }
 const toks=t.trim().split(' ').filter(w=>w.length>=3);
 const scored=NL_LEX.map(e=>{
  let s=0;
  for(const kw of e.kw){
   if(t.indexOf(' '+kw+' ')>=0){ s+=3; continue; }
   const parts=kw.split(' ');
   if(parts.some(kp=>kp.length>=4 && toks.some(w=>w.length>=4 && (w.startsWith(kp.slice(0,4))||kp.startsWith(w.slice(0,4)))))) s+=1;
  }
  return {sys:e.sys,s};
 }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
 const seen=new Set(), ids=[];
 for(const x of scored){ if(!seen.has(x.sys)){ seen.add(x.sys); ids.push(x.sys); } }
 const top=ids.slice(0,6);
 if(!top.length){ out.innerHTML='<p class="nlmsg nlhint">Keep typing, then press Continue — I’ll interpret it and check for anything urgent.</p>'; return; }
 out.innerHTML='<div class="nlsuglabel">Jump to</div><div class="nlsug">'+top.map(id=>{const s=SYSTEMS.find(x=>x.id===id);return s?`<button data-sys="${id}"><span class="nlsug-ic">${SYSICON[s.ic]||''}</span>${esc(s.t)}</button>`:'';}).join('')+'</div>';
 out.querySelectorAll('.nlsug button').forEach(b=>b.onclick=()=>{ if(typeof nlPick==='function') nlPick(b.dataset.sys, raw); });
}

/* ===================================================================
   SMARTER SEARCH (v2.5)
   The old matcher required an exact whole-word/phrase hit, so plurals
   and inflections missed ("loose stools" never matched "stool").
   This replaces it with stem/prefix-aware token matching, shared by
   both the submit route and the live suggestions, and adds a large
   set of everyday plain-English synonyms.
   Safety is unchanged: crisis and emergency phrasing are still tested
   FIRST, before any topic scoring.
   =================================================================== */
function nlToks(tp){ return tp.trim().split(' ').filter(Boolean); }
function nlHit(tp,toks,kw){
 if(kw.indexOf(' ')>=0){
  // phrase: allow a short inflection ("loose stool" also matches "loose stools")
  return new RegExp('\\s'+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[a-z]{0,3}(?=\\s)').test(tp);
 }
 for(const w of toks){
  if(w===kw) return true;
  // keyword is a stem of the typed word: stool→stools, cough→coughing
  if(kw.length>=4 && w.length>kw.length && w.length-kw.length<=3 && w.indexOf(kw)===0) return true;
  // typed word is a prefix of the keyword: diarr→diarrhea, head→headache
  if(w.length>=4 && kw.length>w.length && kw.length-w.length<=4 && kw.indexOf(w)===0) return true;
 }
 return false;
}
function nlScore(raw){
 const tp=nlNorm(raw), toks=nlToks(tp);
 return NL_LEX.map(e=>{
  let s=0;
  for(const kw of e.kw){ if(nlHit(tp,toks,kw)) s+=(kw.indexOf(' ')>=0?3:2); }
  return {sys:e.sys,s};
 }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
}
function nlRoute(raw){
 const tp=nlNorm(raw); if(tp.trim()==='') return {kind:'empty'};
 if(NL_CRISIS.test(tp)) return {kind:'crisis'};      // safety first — unchanged
 if(NL_EMERGENCY.test(tp)) return {kind:'emergency'};
 const scored=nlScore(raw);
 if(!scored.length) return {kind:'none'};
 const seen=new Set(), ids=[];
 for(const x of scored){ if(!seen.has(x.sys)){ seen.add(x.sys); ids.push(x.sys); } }
 const tied=scored.filter(x=>x.s===scored[0].s);
 if(tied.length===1) return {kind:'system',sys:scored[0].sys,all:ids};
 return {kind:'ambiguous',all:ids};
}
